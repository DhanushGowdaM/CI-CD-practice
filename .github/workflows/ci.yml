name: CI-Pipeline

on:
  push:
    branches:["main"]
  pull_request:

jobs:
  build:
    runs-on: uduntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: '17'

      - run: mvn clean install
